# Patrika Engine — nginx site.
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/engine.patrika.com
#   sudo ln -s /etc/nginx/sites-available/engine.patrika.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d engine.patrika.com      # adds HTTPS

server {
    listen 80;
    server_name engine.patrika.com;          # ← your subdomain

    # Widget generation + the ingest tick can run up to ~180s — don't cut them off.
    proxy_read_timeout  200s;
    proxy_send_timeout  200s;
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:3007;    # ← must match PORT in .env
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
